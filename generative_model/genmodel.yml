name: PGAN
channels:
  - conda-forge
dependencies:
  - python=3.9.19
  - pip
  # CUDA for GPU acceleration (adjust version as needed for your hardware)
  - cudatoolkit=11.8.0
  - cudnn=8.9.7.29
  # Scientific stack (conda-managed for better native lib linking)
  - scipy=1.13.1
  - pandas=2.2.2
  - scikit-learn=1.5.2
  - matplotlib=3.9.4
  - h5py=3.11.0
  - anndata=0.10.9
  - tqdm=4.67.1
  # Visualization
  - visdom=0.2.4
  - pip:
      - torch==1.13.1
      - torchvision==0.14.1
      - numpy==1.24.4
      - Pillow==11.3.0
      - seaborn==0.13.2
      - pypandoc==1.15
      - imageio
      # mtgwas is a local dev package — install separately:
      #   pip install -e /path/to/mtgwas