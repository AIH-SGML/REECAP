name: contlearn
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python=3.9.18
  - pip

  - pip:
      # PyTorch with CUDA 12.1 — pip wheels bundle all nvidia-* libs, no conda conflicts
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.2.1+cu121
      - torchvision==0.17.1+cu121
      - timm==0.9.16
      - numpy==1.26.4
      - pandas==2.2.1
      - scikit-learn==1.4.1.post1
      - pillow==10.2.0
      - tqdm==4.67.1
